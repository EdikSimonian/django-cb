{% extends "base.html" %}
{% block title %}{{ action }} Beer{% endblock %}
{% block content %}
<h1>{{ action }} Beer</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {% if action == "Create" %}
        <div class="form-group">
            <label for="id">Document ID</label>
            <input type="text" id="id" name="id" required placeholder="e.g. my_brewery-my_beer">
        </div>
        {% endif %}
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required value="{{ beer.name|default:'' }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ beer.description|default:'' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="style">Style</label>
                <input type="text" id="style" name="style" value="{{ beer.style|default:'' }}" placeholder="e.g. American-Style IPA">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" value="{{ beer.category|default:'' }}" placeholder="e.g. North American Ale">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="abv">ABV %</label>
                <input type="number" id="abv" name="abv" step="0.1" min="0" value="{{ beer.abv|default:'' }}">
            </div>
            <div class="form-group">
                <label for="ibu">IBU</label>
                <input type="number" id="ibu" name="ibu" step="0.1" min="0" value="{{ beer.ibu|default:'' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="srm">SRM</label>
                <input type="number" id="srm" name="srm" step="0.1" min="0" value="{{ beer.srm|default:'' }}">
            </div>
            <div class="form-group">
                <label for="brewery_id">Brewery ID</label>
                <input type="text" id="brewery_id" name="brewery_id" value="{{ beer.brewery_id|default:brewery_id }}" placeholder="e.g. 21st_amendment_brewery_cafe">
            </div>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button type="submit" class="btn">{{ action }} Beer</button>
            {% if beer_id %}
            <a href="{% url 'beers:beer_detail' beer_id %}" class="btn btn-secondary">Cancel</a>
            {% else %}
            <a href="{% url 'beers:beer_list' %}" class="btn btn-secondary">Cancel</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
