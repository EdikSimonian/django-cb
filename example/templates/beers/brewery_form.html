{% extends "base.html" %}
{% block title %}{{ action }} Brewery{% endblock %}
{% block content %}
<h1>{{ action }} Brewery</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {% if action == "Create" %}
        <div class="form-group">
            <label for="id">Document ID</label>
            <input type="text" id="id" name="id" required placeholder="e.g. my_brewery_name">
        </div>
        {% endif %}
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required value="{{ brewery.name|default:'' }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ brewery.description|default:'' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" value="{{ brewery.city|default:'' }}">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" value="{{ brewery.state|default:'' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" value="{{ brewery.country|default:'' }}">
            </div>
            <div class="form-group">
                <label for="code">Postal Code</label>
                <input type="text" id="code" name="code" value="{{ brewery.code|default:'' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="{{ brewery.phone|default:'' }}">
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" value="{{ brewery.website|default:'' }}">
            </div>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button type="submit" class="btn">{{ action }} Brewery</button>
            {% if brewery_id %}
            <a href="{% url 'beers:brewery_detail' brewery_id %}" class="btn btn-secondary">Cancel</a>
            {% else %}
            <a href="{% url 'beers:brewery_list' %}" class="btn btn-secondary">Cancel</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
